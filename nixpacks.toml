# Frontend (Next.js) build for Railway.
#
# devDependencies (tailwindcss/postcss/autoprefixer/typescript) MUST be installed:
# Railway builds with NODE_ENV=production and a plain `npm ci` would skip them,
# so Tailwind CSS would never compile and the app would render unstyled.
[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"
